<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Beni Seviyor Musun?</title>
<style>
body {
    text-align: center;
    font-family: Arial;
    margin-top: 100px;
}
button {
    font-size: 20px;
    padding: 10px 20px;
    margin: 10px;
    position: absolute;
}
#yes {
    left: 40%;
}
#no {
    left: 55%;
}
</style>
</head>
<body>

<h1>Edibe'yi seviyor musun?</h1>

<button id="yes" onclick="yesClick()">Evet</button>
<button id="no" onmouseover="moveNo()">Hayır</button>

<script>
function yesClick() {
    alert("Biliyordum zaten :)");
}

function moveNo() {
    let x = Math.random() * window.innerWidth;
    let y = Math.random() * window.innerHeight;
    document.getElementById("no").style.left = x + "px";
    document.getElementById("no").style.top = y + "px";
}
</script>

</body>
</html>
